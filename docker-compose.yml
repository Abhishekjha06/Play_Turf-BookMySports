services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: play_turf
      POSTGRES_PASSWORD: play_turf
      POSTGRES_DB: play_turf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./components:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
